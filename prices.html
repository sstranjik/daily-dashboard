<!DOCTYPE html>
<html lang="hr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cijene · Morning Insight</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/prices.css">
</head>
<body>

<!-- TOP BAR -->
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="8" height="8" rx="1.5" fill="var(--accent)"/>
        <rect x="10" y="0" width="10" height="10" rx="1.5" fill="var(--accent)" opacity="0.6"/>
        <rect x="0" y="10" width="10" height="10" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="12" y="12" width="8" height="8" rx="1.5" fill="var(--accent)" opacity="0.2"/>
      </svg>
      <span class="topbar-title">Morning Insight</span>
    </div>
  </div>

  <div class="topbar-center">
    <nav class="topbar-nav">
      <a href="index.html" class="topbar-nav-link">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M6 1L1 6h2v5h3V8h2v3h3V6h2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
        </svg>
        Dashboard
      </a>
      <span class="topbar-nav-sep">·</span>
      <span class="topbar-nav-link is-active">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <rect x="1" y="3" width="10" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/>
          <path d="M4 3V2a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Cijene
      </span>
    </nav>
  </div>

  <div class="topbar-right">
    <span id="prices-updated" class="last-update-badge" hidden></span>
    <button id="refresh-btn" class="btn-icon" title="Osvježi" aria-label="Refresh">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M13 2.5A6.5 6.5 0 1 1 6.5 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 1l4 1.5L11.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="prices-main" id="prices-main">

  <!-- FILTERS BAR -->
  <div class="prices-toolbar" id="prices-toolbar">
    <!-- Row 1: category tabs + store toggles -->
    <div class="prices-group-tabs" id="group-tabs" role="tablist">
      <button class="pgp-tab is-active" data-group="sve"       role="tab">Sve kategorije</button>
      <button class="pgp-tab"           data-group="hrana"     role="tab">🥦 Hrana</button>
      <button class="pgp-tab"           data-group="pica"      role="tab">🍺 Pića</button>
      <button class="pgp-tab"           data-group="kozmetika" role="tab">🧴 Kozmetika</button>
    </div>
    <div class="prices-store-toggles" id="store-toggles">
      <button class="pst-btn is-active" data-store="Lidl"     >Lidl</button>
      <button class="pst-btn is-active" data-store="Konzum"   >Konzum</button>
      <button class="pst-btn is-active" data-store="Spar"     >Spar</button>
      <button class="pst-btn is-active" data-store="Studenac" >Studenac</button>
    </div>

    <!-- Row 2: search + day filter -->
    <div class="prices-toolbar-row2">
      <div class="prc-search-wrap">
        <svg class="prc-search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input type="search" id="prices-search" class="prc-search-input"
               placeholder="Pretraži proizvode…" autocomplete="off" spellcheck="false">
      </div>
      <div class="prices-toolbar-days">
        <span class="pday-label">Prikaži za dan:</span>
        <div id="prices-days" class="prices-days-chips"></div>
      </div>
    </div>
  </div>

  <!-- RESULTS INFO (shown only when filters active) -->
  <div class="prices-results-info" id="prices-results-info" hidden></div>

  <!-- CONTENT AREA -->
  <div class="prices-content" id="prices-content">
    <div class="prices-loading" id="prices-loading">
      <div class="sk sk-line" style="width:40%;margin-bottom:20px;height:16px"></div>
      <div class="sk sk-block" style="height:180px;margin-bottom:16px"></div>
      <div class="sk sk-block" style="height:180px;margin-bottom:16px"></div>
      <div class="sk sk-block" style="height:180px"></div>
    </div>
    <div id="prices-grid" class="prices-grid" hidden></div>
    <div id="prices-empty" class="prices-empty" hidden>
      <div class="prices-empty-icon">🛒</div>
      <div class="prices-empty-title">Nema podataka</div>
      <div class="prices-empty-desc">Podaci o cijenama se ažuriraju jednom dnevno. Pokušajte ponovo sutra.</div>
    </div>
    <div id="prices-error" class="prices-empty" hidden>
      <div class="prices-empty-icon">⚠</div>
      <div class="prices-empty-title">Greška pri učitavanju</div>
      <div class="prices-empty-desc" id="prices-error-msg"></div>
    </div>
  </div>

</main>

<script type="module">
// ─── STATE ────────────────────────────────────────────────────────────────────
let _data         = null;
let _activeGroup  = 'sve';
let _activeStores = new Set(['Lidl', 'Konzum', 'Spar', 'Studenac']);
let _searchQuery  = '';   // lowercase, trimmed
let _activeDays   = new Set(); // ISO date strings 'YYYY-MM-DD'

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(`data/prices.json?_=${Date.now()}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    _data = await r.json();
    showUpdated(_data.last_updated);
    render();
  } catch (err) {
    hide('prices-loading');
    show('prices-error');
    document.getElementById('prices-error-msg').textContent = err.message;
  }
}

// ─── DATE PARSING ─────────────────────────────────────────────────────────────
function _today0() {
  const d = new Date(); d.setHours(0,0,0,0); return d;
}

function _parseDate(str) {
  // Parse "DD.MM." — assumes current year; bump to next year if date is more
  // than ~60 days in the past (handles Jan/Feb dates scraped near year end).
  const m = str.match(/(\d{1,2})\.(\d{1,2})\./);
  if (!m) return null;
  const today = _today0();
  const d = new Date(today.getFullYear(), +m[2] - 1, +m[1]);
  if (d < today && (today - d) > 60 * 86400000) d.setFullYear(today.getFullYear() + 1);
  return d;
}

/**
 * Parse item.valid string into { from, to } (Date objects, time=midnight).
 * Returns null if unparseable — such items are always shown.
 * Formats: "do DD.MM."  |  "DD.MM. do DD.MM."  |  "Još danas"
 */
function parseValidRange(valid) {
  if (!valid) return null;
  const today = _today0();

  if (valid === 'Još danas') return { from: today, to: today };

  // "DD.MM. do DD.MM."
  const rangeM = valid.match(/^(\d{1,2}\.\d{1,2}\.) do (\d{1,2}\.\d{1,2}\.)$/);
  if (rangeM) {
    const from = _parseDate(rangeM[1]);
    const to   = _parseDate(rangeM[2]);
    if (from && to) return { from, to };
  }

  // "do DD.MM."
  const toM = valid.match(/^do (\d{1,2}\.\d{1,2}\.)$/);
  if (toM) {
    const to = _parseDate(toM[1]);
    if (to) return { from: today, to };
  }

  return null; // unparseable → always show
}

// ─── ITEM FILTER ──────────────────────────────────────────────────────────────
function filterItems(items) {
  const hasSearch = _searchQuery.length > 0;
  const hasDays   = _activeDays.size > 0;
  if (!hasSearch && !hasDays) return items;

  return items.filter(item => {
    // Search: item.name must contain query (case-insensitive)
    if (hasSearch && !(item.name ?? '').toLowerCase().includes(_searchQuery)) {
      return false;
    }
    // Day filter: at least one active day must fall within item's valid range
    if (hasDays) {
      const range = parseValidRange(item.valid);
      if (range) {
        const ok = [..._activeDays].some(iso => {
          const d = new Date(iso);
          return d >= range.from && d <= range.to;
        });
        if (!ok) return false;
      }
      // null range (unparseable or missing) → show regardless of day filter
    }
    return true;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  hide('prices-loading');

  if (!_data || !_data.categories?.length) {
    show('prices-empty');
    return;
  }

  const cats = _data.categories.filter(c =>
    _activeGroup === 'sve' || c.group === _activeGroup
  );

  // Count totals for results-info badge
  let totalCount = 0, filteredCount = 0;
  for (const c of cats) {
    for (const s of _activeStores) {
      const raw = c.items?.[s] ?? [];
      totalCount    += raw.length;
      filteredCount += filterItems(raw).length;
    }
  }
  _updateResultsInfo(totalCount, filteredCount);

  // Only include categories that have at least 1 item after filtering
  const visible = cats.filter(c =>
    [..._activeStores].some(s => filterItems(c.items?.[s] ?? []).length > 0)
  );

  if (!visible.length) {
    hide('prices-grid');
    // Tailor empty message to active filters
    const desc = document.querySelector('#prices-empty .prices-empty-desc');
    if (desc) {
      if (_searchQuery) {
        desc.textContent = `Nema akcija za pretragu "${_searchQuery}".`;
      } else if (_activeDays.size > 0) {
        desc.textContent = 'Nema akcija za odabrane dane.';
      } else {
        desc.textContent = 'Podaci o cijenama se ažuriraju jednom dnevno. Pokušajte ponovo sutra.';
      }
    }
    show('prices-empty');
    return;
  }

  hide('prices-empty');
  const grid = document.getElementById('prices-grid');
  grid.innerHTML = visible.map(c => renderCategory(c)).join('');
  show('prices-grid');
}

function _updateResultsInfo(total, filtered) {
  const el = document.getElementById('prices-results-info');
  if (!el) return;
  const hasFilter = _searchQuery || _activeDays.size > 0;
  if (hasFilter && filtered < total) {
    el.textContent = `${filtered} od ${total} akcija`;
    el.removeAttribute('hidden');
  } else {
    el.setAttribute('hidden', '');
  }
}

function renderCategory(cat) {
  const storeOrder = ['Lidl', 'Konzum', 'Spar', 'Studenac'];
  const activeList = storeOrder.filter(s => _activeStores.has(s));

  const cols = activeList.map(store => {
    const items = filterItems(cat.items?.[store] ?? []).slice(0, 20);
    const cards = items.length
      ? items.map(renderCard).join('')
      : `<div class="prc-empty-store">Nema akcija ovaj tjedan</div>`;

    return `
      <div class="prc-store-col" data-store="${esc(store)}">
        <div class="prc-store-header prc-store-${store.toLowerCase()}">
          ${esc(store)}
          <span class="prc-store-count">${items.length}</span>
        </div>
        <div class="prc-store-items">${cards}</div>
      </div>`;
  }).join('');

  return `
    <section class="prc-category" data-group="${esc(cat.group)}">
      <h2 class="prc-category-title">${esc(cat.label)}</h2>
      <div class="prc-store-grid" style="--col-count:${activeList.length}">${cols}</div>
    </section>`;
}

function renderCard(item) {
  const discBadge = item.discount
    ? `<span class="prc-card-disc">-${item.discount}%</span>`
    : '';
  const valid = item.valid
    ? `<span class="prc-card-valid">${esc(item.valid)}</span>`
    : '';
  const link = item.url
    ? `href="${esc(item.url)}" target="_blank" rel="noopener"`
    : '';
  const nameHtml = _highlightSearch(item.name);

  return `
    <a class="prc-card" ${link}>
      <div class="prc-card-name">${nameHtml}</div>
      <div class="prc-card-bottom">
        <span class="prc-card-price">${esc(item.price_str)}</span>
        ${discBadge}
        ${valid}
      </div>
    </a>`;
}

/** Highlight the search query within the product name */
function _highlightSearch(name) {
  const text = name ?? '';
  if (!_searchQuery) return esc(text);
  const idx = text.toLowerCase().indexOf(_searchQuery);
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx))
    + `<mark class="prc-match">${esc(text.slice(idx, idx + _searchQuery.length))}</mark>`
    + esc(text.slice(idx + _searchQuery.length));
}

// ─── FILTERS ──────────────────────────────────────────────────────────────────
document.getElementById('group-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.pgp-tab');
  if (!btn) return;
  document.querySelectorAll('.pgp-tab').forEach(b => b.classList.remove('is-active'));
  btn.classList.add('is-active');
  _activeGroup = btn.dataset.group;
  render();
});

document.getElementById('store-toggles').addEventListener('click', e => {
  const btn = e.target.closest('.pst-btn');
  if (!btn) return;
  const store = btn.dataset.store;
  if (_activeStores.has(store)) {
    if (_activeStores.size === 1) return; // keep at least one
    _activeStores.delete(store);
    btn.classList.remove('is-active');
  } else {
    _activeStores.add(store);
    btn.classList.add('is-active');
  }
  render();
});

// Search input — live filter on every keystroke
document.getElementById('prices-search').addEventListener('input', e => {
  _searchQuery = e.target.value.trim().toLowerCase();
  render();
});

// Day chips — built dynamically; toggle on click
function buildDayChips() {
  const container = document.getElementById('prices-days');
  const HR_SHORT  = ['ned','pon','uto','sri','čet','pet','sub'];
  const today     = _today0();

  container.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const iso   = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const label = i === 0
      ? 'danas'
      : `${HR_SHORT[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;

    const btn = document.createElement('button');
    btn.className = 'pday-btn';
    btn.dataset.date = iso;
    btn.textContent = label;
    if (i === 0) btn.dataset.today = '';
    btn.addEventListener('click', () => {
      if (_activeDays.has(iso)) {
        _activeDays.delete(iso);
        btn.classList.remove('is-active');
      } else {
        _activeDays.add(iso);
        btn.classList.add('is-active');
      }
      render();
    });
    container.appendChild(btn);
  }
}

document.getElementById('refresh-btn').addEventListener('click', () => {
  show('prices-loading');
  hide('prices-grid');
  hide('prices-empty');
  hide('prices-error');
  loadData();
});

// ─── UTILS ────────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id)?.removeAttribute('hidden'); }
function hide(id) { document.getElementById(id)?.setAttribute('hidden', ''); }
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showUpdated(iso) {
  if (!iso) return;
  const el = document.getElementById('prices-updated');
  if (!el) return;
  const d = new Date(iso);
  const fmt = d.toLocaleString('hr-HR', { day:'numeric', month:'numeric', hour:'2-digit', minute:'2-digit' });
  el.textContent = `Ažurirano: ${fmt}`;
  el.removeAttribute('hidden');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildDayChips();
loadData();
</script>
</body>
</html>
