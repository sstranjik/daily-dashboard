<!DOCTYPE html>
<html lang="hr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal daily dashboard">
  <title>Morning Insight</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/widgets.css">
  <link rel="stylesheet" href="css/focus-widget.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="8" height="8" rx="1.5" fill="var(--accent)"/>
        <rect x="10" y="0" width="10" height="10" rx="1.5" fill="var(--accent)" opacity="0.6"/>
        <rect x="0" y="10" width="10" height="10" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="12" y="12" width="8" height="8" rx="1.5" fill="var(--accent)" opacity="0.2"/>
      </svg>
      <span class="topbar-title">Morning Insight</span>
    </div>
  </div>

  <div class="topbar-center">
    <time id="topbar-clock" class="topbar-clock font-mono" aria-live="polite">--:--:--</time>
    <span class="topbar-date-sep" aria-hidden="true">·</span>
    <span id="topbar-date" class="topbar-date">---</span>
    <span class="topbar-date-sep" aria-hidden="true">·</span>
    <div id="topbar-weather" class="topbar-forecast" aria-label="7-day forecast"></div>
  </div>

  <div class="topbar-right">
    <span id="last-update-badge" class="last-update-badge" hidden></span>
    <a href="prices.html" class="btn-icon topbar-prices-link" title="Cijene po dućanima" aria-label="Cijene">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="3.5" width="12" height="9" rx="1.2" stroke="currentColor" stroke-width="1.3"/>
        <path d="M5 3.5V3a2 2 0 0 1 4 0v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M4 7.5h6M4 10h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </a>
    <button id="refresh-all-btn" class="btn-icon" title="Osvježi sve" aria-label="Refresh all">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M13 2.5A6.5 6.5 0 1 1 6.5 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 1l4 1.5L11.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="settings-btn" class="btn-icon" title="Settings" aria-label="Settings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 1v1M7 12v1M1 7h1M12 7h1M2.6 2.6l.7.7M10.7 10.7l.7.7M2.6 11.4l.7-.7M10.7 3.3l.7-.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="user-profile" class="user-profile-area">
      <div id="user-avatar-area" class="user-avatar-area hidden">
        <img id="user-img" class="user-avatar-img" alt="" width="26" height="26">
        <span id="user-display-name" class="user-display-name"></span>
        <button id="signout-btn" class="btn-text-sm">Sign out</button>
      </div>
      <div id="google-signin-btn" class="btn-signin-wrap"></div>
    </div>
  </div>
</header>

<!-- PAGE SHELL: focus sidebar + main content -->
<div class="dashboard-outer">

<!-- DNEVNI FOKUS SIDEBAR -->
<aside class="focus-sidebar">
  <div class="focus-widget">
    <div class="focus-widget-header">
      <svg class="focus-widget-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <rect x="1" y="2" width="10" height="1.5" rx=".75" fill="currentColor"/>
        <rect x="1" y="5.25" width="7" height="1.5" rx=".75" fill="currentColor"/>
        <rect x="1" y="8.5" width="8.5" height="1.5" rx=".75" fill="currentColor"/>
      </svg>
      <span class="focus-widget-title">Dnevni fokus</span>
      <button class="focus-add-btn" id="focus-open-edit" title="Upravljaj taskovima">+</button>
    </div>
    <div class="focus-task-list" id="focus-task-list"></div>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="dashboard" id="dashboard">

  <!-- ROW 1: KALENDAR | TASKOVI | VRIJEME -->
  <div class="row-top">

    <!-- GOOGLE CALENDAR -->
    <div id="section-calendar" data-widget="calendar">
      <div id="widget-calendar" class="widget widget-calendar loading">
        <div class="sk sk-title" style="width:55%;margin-bottom:16px"></div>
        <div class="sk sk-line sk-sm" style="width:30%;margin-bottom:12px"></div>
        <div class="sk sk-line" style="width:90%"></div>
        <div class="sk sk-line" style="width:80%"></div>
        <div class="sk sk-line sk-sm" style="width:28%;margin-top:12px;margin-bottom:8px"></div>
        <div class="sk sk-line" style="width:85%"></div>
        <div class="sk sk-line" style="width:70%"></div>
      </div>
    </div>

    <!-- GOOGLE TASKS -->
    <div id="section-tasks" data-widget="tasks">
      <div id="widget-tasks" class="widget widget-tasks loading">
        <div class="sk sk-title" style="width:50%;margin-bottom:16px"></div>
        <div class="sk sk-line" style="width:95%"></div>
        <div class="sk sk-line" style="width:88%"></div>
        <div class="sk sk-line" style="width:92%"></div>
        <div class="sk sk-line" style="width:76%"></div>
        <div class="sk sk-line" style="width:84%"></div>
      </div>
    </div>

    <!-- COMPACT WEATHER + 7-DAY -->
    <div id="section-weather" data-widget="weather">
      <div id="widget-weather" class="widget widget-weather loading">
        <div class="sk sk-xl" style="width:60%;margin-bottom:8px"></div>
        <div class="sk sk-line sk-sm" style="width:45%"></div>
        <div class="sk sk-block" style="height:72px;margin-top:16px"></div>
        <div class="sk sk-block" style="height:44px;margin-top:12px"></div>
      </div>
    </div>

  </div>

  <!-- ROW 2: JUTARNJI PREGLED -->
  <section id="section-briefing" data-widget="briefing">
    <div id="widget-briefing" class="widget widget-briefing loading">
      <div class="sk sk-title" style="width:40%;margin-bottom:8px"></div>
      <div class="sk sk-line sk-sm" style="width:30%;margin-bottom:20px"></div>
      <div class="sk sk-line" style="width:94%"></div>
      <div class="sk sk-line" style="width:88%"></div>
      <div class="sk sk-line" style="width:82%"></div>
      <div class="sk sk-line" style="width:90%"></div>
      <div class="sk sk-line" style="width:72%"></div>
    </div>
  </section>

  <!-- ROW 3: VIJESTI (tabs, scrollable) -->
  <section id="section-news" data-widget="news">
    <div id="widget-news" class="widget widget-news-unified loading">
      <div class="sk sk-title" style="width:50%;margin-bottom:16px"></div>
      <div style="display:flex;gap:16px;margin-bottom:16px">
        <div class="sk sk-line" style="width:60px;height:12px"></div>
        <div class="sk sk-line" style="width:60px;height:12px"></div>
        <div class="sk sk-line" style="width:60px;height:12px"></div>
        <div class="sk sk-line" style="width:60px;height:12px"></div>
      </div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
      <div class="sk sk-card"></div>
    </div>
  </section>

</main>

</div><!-- /.dashboard-outer -->

<!-- TOAST -->
<div id="toast-container" class="toast-container" aria-live="polite"></div>

<!-- TASK EDIT MODAL -->
<div id="task-modal-overlay" class="modal-overlay hidden"></div>
<div id="task-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
  <div class="modal-header">
    <h3 class="modal-title" id="task-modal-title">Uredi zadatak</h3>
    <button class="btn-icon" id="task-modal-close" aria-label="Zatvori">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 1l11 11M12 1L1 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <input id="task-edit-title" type="text" class="modal-input" placeholder="Naziv zadatka" maxlength="200">
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label">Datum</label>
        <input id="task-edit-date" type="date" class="modal-input">
      </div>
      <div class="modal-field">
        <label class="modal-label">Podsjetnik</label>
        <input id="task-edit-time" type="time" class="modal-input">
      </div>
    </div>
    <textarea id="task-edit-notes" class="modal-textarea" placeholder="Bilješke (opcionalno)" rows="3"></textarea>
  </div>
  <div class="modal-footer">
    <button id="task-modal-cancel" class="btn-secondary">Odustani</button>
    <button id="task-modal-save" class="btn-primary">Spremi</button>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-overlay" class="settings-overlay hidden"></div>
<aside id="settings-panel" class="settings-panel hidden" aria-label="Settings">
  <div class="settings-header">
    <h2 class="settings-title">Settings</h2>
    <button id="close-settings-btn" class="btn-icon" aria-label="Close">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 1l11 11M12 1L1 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="settings-body" id="settings-body"></div>
</aside>

<!-- FOCUS EDIT MODAL (list of all tasks) -->
<div id="focus-edit-overlay" class="modal-overlay hidden"></div>
<div id="focus-edit-modal" class="modal hidden" style="width:min(520px,92vw)" role="dialog" aria-modal="true">
  <div class="modal-header">
    <h3 class="modal-title">Taskovi</h3>
    <button class="btn-icon" id="focus-edit-close" aria-label="Zatvori">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 1l11 11M12 1L1 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="focus-edit-list" id="focus-edit-list"></div>
    <button class="btn-primary" id="focus-add-new-btn" style="width:100%">+ Dodaj novi task</button>
  </div>
</div>

<!-- FOCUS FORM MODAL (add / edit single task) -->
<div id="focus-form-overlay" class="modal-overlay hidden" style="z-index:410"></div>
<div id="focus-form-modal" class="modal hidden" style="width:min(480px,92vw);z-index:411" role="dialog" aria-modal="true">
  <div class="modal-header">
    <h3 class="modal-title" id="focus-form-title">Novi task</h3>
    <button class="btn-icon" id="focus-form-close" aria-label="Zatvori">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 1l11 11M12 1L1 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <!-- Name + Priority -->
    <div style="display:flex;gap:var(--sp-3)">
      <div style="flex:1">
        <label class="ff-label" for="ff-name">Naziv *</label>
        <input type="text" id="ff-name" class="modal-input" placeholder="Naziv taska…" maxlength="120">
      </div>
      <div style="width:90px">
        <label class="ff-label" for="ff-priority">Prioritet</label>
        <input type="number" id="ff-priority" class="modal-input" placeholder="–" min="1" max="999">
      </div>
    </div>

    <!-- Content type toggle -->
    <div>
      <label class="ff-label">Sadržaj</label>
      <div class="ff-content-toggle">
        <button class="ff-toggle-btn is-active" id="ff-toggle-text">Tekst</button>
        <button class="ff-toggle-btn" id="ff-toggle-list">Lista</button>
      </div>
      <div id="ff-text-wrap">
        <textarea id="ff-text" class="modal-textarea" placeholder="Sadržaj taska…" rows="4"></textarea>
      </div>
      <div id="ff-checklist-wrap" style="display:none">
        <div class="ff-checklist-items" id="ff-checklist-items"></div>
        <button class="ff-add-item-btn" id="ff-add-item">+ Dodaj stavku</button>
      </div>
    </div>

    <!-- Reminder -->
    <div>
      <label class="ff-reminder-row">
        <input type="checkbox" id="ff-reminder-on">
        <span>Dodaj podsjetnik</span>
      </label>
      <div id="ff-reminder-fields" style="display:none">
        <div class="ff-day-options">
          <label class="ff-day-option">
            <input type="radio" name="ff-day" value="today" checked> Danas
          </label>
          <label class="ff-day-option">
            <input type="radio" name="ff-day" value="tomorrow"> Sutra
          </label>
        </div>
        <input type="time" id="ff-time" class="modal-input" style="width:140px">
        <span class="ff-time-hint" id="ff-time-hint"></span>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="focus-form-delete" id="focus-form-delete" style="display:none">Obriši task</button>
    <button class="btn-secondary" id="focus-form-cancel">Odustani</button>
    <button class="btn-primary"   id="focus-form-save">Spremi</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
