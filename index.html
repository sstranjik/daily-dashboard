<!DOCTYPE html>
<html lang="hr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal daily dashboard — morning briefing, weather, news">
  <title>Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/widgets.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar" id="topbar">
  <div class="topbar-left">
    <div class="topbar-brand">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect width="8" height="8" rx="1.5" fill="var(--accent)"/>
        <rect x="10" y="0" width="10" height="10" rx="1.5" fill="var(--accent)" opacity="0.6"/>
        <rect x="0" y="10" width="10" height="10" rx="1.5" fill="var(--accent)" opacity="0.4"/>
        <rect x="12" y="12" width="8" height="8" rx="1.5" fill="var(--accent)" opacity="0.2"/>
      </svg>
      <span class="topbar-title">Morning Insight</span>
    </div>
  </div>

  <!-- CENTER: clock + date + 7-day forecast -->
  <div class="topbar-center">
    <div class="topbar-datetime">
      <time id="topbar-clock" class="topbar-clock font-mono" aria-live="polite">--:--:--</time>
      <span id="topbar-date" class="topbar-date">---</span>
    </div>
    <div class="topbar-divider" aria-hidden="true"></div>
    <!-- 7-day weather forecast strip -->
    <div id="topbar-weather" class="topbar-forecast" aria-label="7-day forecast">
      <div class="fc-loading">
        <span class="fc-dot"></span><span class="fc-dot"></span><span class="fc-dot"></span>
      </div>
    </div>
  </div>

  <div class="topbar-right">
    <span id="last-update-badge" class="last-update-badge" hidden></span>
    <button id="refresh-all-btn" class="btn-icon" title="Osvježi sve" aria-label="Refresh all">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M13 2.5A6.5 6.5 0 1 1 6.5 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M9 1l4 1.5L11.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="settings-btn" class="btn-icon" title="Settings" aria-label="Settings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 1v1M7 12v1M1 7h1M12 7h1M2.6 2.6l.7.7M10.7 10.7l.7.7M2.6 11.4l.7-.7M10.7 3.3l.7-.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="user-profile" class="user-profile-area">
      <div id="user-avatar-area" class="user-avatar-area" hidden>
        <img id="user-img" class="user-avatar-img" alt="" width="26" height="26">
        <span id="user-display-name" class="user-display-name"></span>
        <button id="signout-btn" class="btn-text-sm">Sign out</button>
      </div>
      <button id="google-signin-btn" class="btn-signin">
        <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in
      </button>
    </div>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="dashboard" id="dashboard">

  <!-- HERO: AI DAILY BRIEFING -->
  <section class="section-hero" id="section-briefing" data-widget="briefing">
    <div id="widget-briefing" class="widget widget-briefing loading">
      <div class="skeleton-hero">
        <div class="sk sk-line sk-title"></div>
        <div class="sk sk-line sk-sm" style="width:38%"></div>
        <div style="margin-top:20px">
          <div class="sk sk-line" style="width:92%"></div>
          <div class="sk sk-line" style="width:86%"></div>
          <div class="sk sk-line" style="width:78%"></div>
          <div class="sk sk-line" style="width:82%"></div>
          <div class="sk sk-line" style="width:62%"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- WIDGET GRID -->
  <div class="dashboard-grid" id="dashboard-grid">

    <!-- WEATHER -->
    <div class="gi gi-weather" id="section-weather" data-widget="weather">
      <div id="widget-weather" class="widget widget-weather loading">
        <div class="sk sk-line sk-xl" style="width:55%;margin-bottom:10px"></div>
        <div class="sk sk-line sk-sm" style="width:38%"></div>
        <div class="sk sk-block" style="height:80px;margin-top:18px"></div>
        <div class="sk sk-block" style="height:52px;margin-top:14px"></div>
      </div>
    </div>

    <!-- PRODUKTIVNOST -->
    <div class="gi gi-productivity" id="section-productivity" data-widget="productivity">
      <div id="widget-productivity" class="widget widget-productivity loading">
        <div class="sk sk-line sk-title" style="width:55%"></div>
        <div class="sk sk-line" style="width:82%"></div>
        <div class="sk sk-line" style="width:72%"></div>
        <div class="sk sk-line" style="width:58%"></div>
      </div>
    </div>

    <!-- HR VIJESTI -->
    <div class="gi gi-hr-news" id="section-hr-news" data-widget="hr_news">
      <div id="widget-hr-news" class="widget widget-news loading">
        <div class="sk sk-line sk-title" style="width:48%"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
      </div>
    </div>

    <!-- TECH / AI -->
    <div class="gi gi-tech" id="section-tech" data-widget="tech_news">
      <div id="widget-tech" class="widget widget-news loading">
        <div class="sk sk-line sk-title" style="width:52%"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
      </div>
    </div>

    <!-- SCIENCE -->
    <div class="gi gi-science" id="section-science" data-widget="science">
      <div id="widget-science" class="widget widget-news loading">
        <div class="sk sk-line sk-title" style="width:44%"></div>
        <div class="sk sk-card"></div>
        <div class="sk sk-card"></div>
      </div>
    </div>

    <!-- SPORT -->
    <div class="gi gi-sports" id="section-sports" data-widget="sports">
      <div id="widget-sports" class="widget widget-sports loading">
        <div class="sk sk-line sk-title" style="width:38%"></div>
        <div class="sk sk-line" style="width:92%"></div>
        <div class="sk sk-line" style="width:86%"></div>
        <div class="sk sk-line" style="width:76%"></div>
      </div>
    </div>

  </div>
</main>

<!-- TOAST -->
<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<!-- SETTINGS PANEL -->
<div id="settings-overlay" class="settings-overlay hidden"></div>
<aside id="settings-panel" class="settings-panel hidden" aria-label="Settings">
  <div class="settings-header">
    <h2 class="settings-title">Settings</h2>
    <button id="close-settings-btn" class="btn-icon" aria-label="Close settings">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="settings-body" id="settings-body"></div>
</aside>

<script type="module" src="js/app.js"></script>
</body>
</html>
