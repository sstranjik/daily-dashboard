name: Daily Dashboard Update

on:
  schedule:
    # 05:00 UTC = 07:00 CET / 08:00 CEST (Croatia)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      skip_briefing:
        description: 'Skip AI briefing generation'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Fetch news and data
        working-directory: scripts
        run: node fetch-all.mjs

      - name: Fetch events (concerts + theater)
        working-directory: scripts
        run: node fetch-events.mjs

      - name: Fetch supermarket prices
        working-directory: scripts
        run: node fetch-prices.mjs

      - name: Generate daily briefing
        if: ${{ !inputs.skip_briefing }}
        working-directory: scripts
        run: node generate-briefing.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit updated data files
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: daily update $(date +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after 3 attempts"
                exit 1
              fi
              echo "Push attempt $attempt failed, retrying in 15s..."
              sleep 15
            done
          fi
